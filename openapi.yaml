                  node_id, member_sn_list'
        '403':
          description: Forbidden — invalid API key or tid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /ai-recommendation/get-ai-recommendation/:
    get:
      tags:
      - Recommendation
      summary: Get AI Product Recommendations
      operationId: getAIRecommendation
      description: 'Fetch AI-powered product recommendations.


        Choose a `recommend_type` based on your use case:

        - **Personalized**: use `user_item_embedding` with `cid` (and optionally `uid`
        for logged-in users)

        - **Related products**: use `also_bought` or `also_viewed` with `product_ids`
        as seed products


        Use filter parameters (`product_tag`, `product_category`, etc.) to narrow
        results to a

        specific catalog subset. Use `excluded_product_ids` to hide products the user
        has already seen.

        '
      parameters:
      - name: tid
        in: query
        required: true
        schema:
          type: string
        description: Organization tenant ID
        example: OA-xxxxxx
      - name: recommend_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user_item_embedding
          - also_bought
          - also_viewed
        description: Recommendation algorithm to use
      - name: num
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 50
        description: Number of products to return (max 50)
      - name: cid
        in: query
        required: false
        schema:
          type: string
        description: 'Device ID — **required** when `recommend_type=user_item_embedding`.

          Same value as `client_id` in the Event Tracking API.

          '
      - name: uid
        in: query
        required: false
        schema:
          type: string
        description: Member ID — include for logged-in users to improve personalization
          accuracy
      - name: product_ids
        in: query
        required: false
        schema:
          type: array
          maxItems: 10
          items:
            type: string
        style: form
        explode: true
        description: 'Seed product IDs — required for also_bought / also_viewed. Max
          10. Repeat: ?product_ids=p1&product_ids=p2'
      - name: product_tag
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
        description: Filter results to products with these tag IDs
        example:
        - 101
        - 202
      - name: product_tag_names
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        description: Filter results to products with these tag names
        example:
        - sale
        - new-arrival
      - name: product_category
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
        description: Filter results to products in these category IDs
        example:
        - 5
        - 12
      - name: product_category_names
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        description: Filter results to products in these category names
        example:
        - Electronics
        - Accessories
      - name: excluded_product_ids
        in: query
        required: false
        schema:
          type: array
          maxItems: 10
          items:
            type: string
        style: form
        explode: true
        description: Exclude these product IDs from results (max 10)
        example:
        - P001
        - P002
      - name: excluded_product_tag
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
        description: Exclude products with these tag IDs from results
        example:
        - 999
      - name: excluded_product_tag_names
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        description: Exclude products with these tag names from results
        example:
        - out-of-stock
      - name: sorting
        in: query
        required: false
        schema:
          type: string
          enum:
          - random
        example: random
        description: 'Omit for relevance-based ordering (default, highest score first).

          `random`: shuffle results randomly.

          '
      responses:
        '200':
          description: Ordered list of recommended products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecommendedProduct'
              examples:
                UserItemEmbeddingResponse:
                  summary: Response for user_item_embedding
                  description: 'Example for: `GET /ai-recommendation/get-ai-recommendation/?tid=OA-xxxxxx&cid=device123&uid=139540&recommend_type=user_item_embedding&num=5`

                    '
                  value:
                  - product_id: 1
                    product_name: Logitech M221 Silent Mouse
                    product_url: https://example.com/products/1
                    product_price: 800
                    special_price: 720
                    photo_url: https://cdn.example.com/m221.jpg
                    additional_photo_url:
                    - name: 100x100
                      link: https://cdn.example.com/m221-100.jpg
                    - name: 200x200
                      link: https://cdn.example.com/m221-200.jpg
                  - product_id: 2
                    product_name: Logitech K65M Keyboard
                    product_url: https://example.com/products/2
                    product_price: 2800
                    special_price: 2800
                    photo_url: https://cdn.example.com/k65m.jpg
                    additional_photo_url: []
                AlsoBoughtResponse:
                  summary: 'Response for also_bought (seed: p1, p2)'
                  description: 'Example for: `GET /ai-recommendation/get-ai-recommendation/?tid=OA-xxxxxx&recommend_type=also_bought&num=3&product_ids=p1&product_ids=p2`

                    '
                  value:
                  - product_id: 5
                    product_name: Mouse Pad XL
                    product_url: https://example.com/products/5
                    product_price: 300
                    special_price: 250
                    photo_url: https://cdn.example.com/mousepad.jpg
                    additional_photo_url: []
                  - product_id: 8
                    product_name: USB-C Hub
                    product_url: https://example.com/products/8
                    product_price: 1200
                    special_price: 1200
                    photo_url: https://cdn.example.com/hub.jpg
                    additional_photo_url: []
        '400':
          description: Bad Request — missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing required parameter: recommend_type'
  /api/v1/audiences/audiences-mapping/:
    post:
      tags:
      - Mapping
      summary: Create Audience Mapping
      operationId: createAudienceMapping
      description: 'Link an external system''s unique ID (`source_id`) to an OmniSegment
        audience record.


        Provide the `mapping_key` to specify which field to use for matching, then
        include

        the value for that field (e.g., if `mapping_key = "phone"`, include `"phone":
        "+886..."` in the body).


        **mapping_key options**:

        - `member_sn` — match by e-commerce member serial number

        - `phone` — match by phone number

        - `email` — match by email address

        - `line_id` — match by LINE ID

        '
      parameters:
      - $ref: '#/components/parameters/TidQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - source_id
              - source_system
              - mapping_key
              properties:
                source_id:
                  type: string
                  description: Unique identifier in the external system
                  example: '12345'
                source_system:
                  type: string
                  description: External system category (e.g., CRM, POS, offline)
                  example: CRM
                mapping_key:
                  type: string
                  enum:
                  - member_sn
                  - phone
                  - email
                  - line_id
                  description: Field to use when looking up the OmniSegment audience
                member_sn:
                  type: string
                  description: Required when mapping_key is "member_sn"
                phone:
                  type: string
                  description: Required when mapping_key is "phone"
                  example: '+886987654321'
                email:
                  type: string
                  format: email
                  description: Required when mapping_key is "email"
                line_id:
                  type: string
                  description: Required when mapping_key is "line_id"
            examples:
              ByPhone:
                summary: Map by phone number
                value:
                  source_id: '12345'
                  source_system: CRM
                  mapping_key: phone
                  phone: '+886987654321'
              ByEmail:
                summary: Map by email
                value:
                  source_id: CRM-67890
                  source_system: POS
                  mapping_key: email
                  email: customer@example.com
              ByMemberSn:
                summary: Map by member serial number
                value:
                  source_id: EXT-001
                  source_system: LegacySystem
                  mapping_key: member_sn
                  member_sn: M001234
              ByLineId:
                summary: Map by LINE ID
                value:
                  source_id: CRM-LINE-001
                  source_system: CRM
                  mapping_key: line_id
                  line_id: Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        '200':
          description: Mapping created or headless audience created successfully
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request — missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: source_id, source_system and mapping_key
                  are required'
        '403':
          description: Forbidden — invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid X-OmniSegment-Api-Key'
components:
  schemas:
    FcmTokenObject:
      type: object
      required:
      - token
      properties:
        token:
          type: string
        active:
          type: boolean
          default: true
        type:
          type: string
          enum:
          - ios
          - android
    ChannelSubscription:
      type: object
      required:
      - name
      - subscription_status
      properties:
        name:
          type: string
        subscription_status:
          type: boolean
    AudienceData:
      type: object
      description: Audience (customer) profile data
      properties:
        member_sn:
          type: string
          description: E-commerce member serial number
        source_id:
          type: string
          description: External source ID (use with source_system)
        source_system:
          type: string
          description: Required when using source_id
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          example: '+886912345678'
        member_level:
          type: string
        sex:
          type: string
          enum:
          - male
          - female
        birthday:
          type: string
          format: date
          example: '1990-01-01'
        register_date:
          type: string
          format: date-time
          example: '2020-06-04T08:30:37.235482+08:00'
        register_type:
          type: string
        facebook_id:
          type: string
        google_id:
          type: string
        line_id:
          type: string
        messenger_psid:
          type: string
        fcm_token:
          type: string
          description: Single FCM token; use fcm_tokens for multiple
        fcm_tokens:
          type: array
          items:
            $ref: '#/components/schemas/FcmTokenObject'
        is_subscriber:
          type: boolean
        is_subscriber_sms:
          type: boolean
        is_subscriber_line:
          type: boolean
        is_subscriber_pn:
          type: boolean
        is_active:
          type: boolean
        is_headless_account:
          type: boolean
        crm_pk:
          type: string
        tags:
          type: string
          description: Comma-separated tags, e.g. 'tag_a,tag_b'
        iso_code:
          type: string
          example: TW
        sites:
          type: string
        city:
          type: string
        country:
          type: string
        province:
          type: string
        zip_code:
          type: string
        address:
          type: string
        email_channels:
          type: array
          items:
            $ref: '#/components/schemas/ChannelSubscription'
        line_channels:
          type: array
          items:
            $ref: '#/components/schemas/ChannelSubscription'
        membership_renewal_diff:
          type: string
        membership_upgrade_diff:
          type: string
        membership_upgrade_oneday_diff:
          type: string
        membership_expire_at:
          type: string
          format: date-time
          example: '2025-07-23T08:30:37+08:00'
        point_balance:
          type: string
        credit_balance:
          type: string
    ErrorResponse:
      type: object
      properties:
        SUCCESS:
          type: boolean
          example: false
        ERR_MSG:
          type: string
    ShippingAddress:
      type: object
      required:
      - address1
      properties:
        address1:
          type: string
        address2:
          type: string
          nullable: true
        city:
          type: string
        company:
          type: string
        country:
          type: string
        country_code:
          type: string
        latitude:
          type: string
          nullable: true
        longitude:
          type: string
          nullable: true
        province:
          type: string
        province_code:
          type: string
        zip:
          type: string
    VoucherObject:
      type: object
      required:
      - voucher_name
      properties:
        voucher_name:
          type: string
    PurchaseData:
      type: object
      required:
      - transaction_id
      - transaction_revenue
      - datetime
      description: A single purchase / transaction record
      properties:
        member_sn:
          type: string
          description: Member serial number. Use source_id if mapping via Audience
            Mapping API.
        source_id:
          type: string
        source_system:
          type: string
          description: Required when using source_id instead of member_sn
        datetime:
          type: string
          format: date-time
          example: 2024-07-15T09:51:23+0800
          description: Order creation date (ISO 8601)
        transaction_id:
          type: string
          description: Unique order / transaction ID
        transaction_revenue:
          type: number
          description: Total order amount
        transaction_status:
          type: string
          enum:
          - SUCCESS
          - CANCEL
          - REFUND
          - FAIL
          - SHIPPED
          - PAID
          default: SUCCESS
        quantities:
          type: integer
          description: Total number of items in the order
        products:
          description: 'Product IDs (comma-separated string) or mapping object.


            String example: `"P001,P002"`


            Mapping object example: `{"default": "P001,P002", "CRM": "CRM-P001,CRM-P002"}`

            '
          oneOf:
          - type: string
            example: P001,P002
          - type: object
            additionalProperties:
              type: string
            example:
              default: P001,P002
              CRM: CRM-P001,CRM-P002
        products_name:
          type: string
          description: Comma-separated product names (matched in order with products)
        products_quantity:
          type: string
          description: Comma-separated quantities per product
          example: 1,2
        physical_store_name:
          type: string
          description: Offline store name
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
        voucher:
          type: array
          items:
            $ref: '#/components/schemas/VoucherObject'
        coupon:
          type: string
          example: coupon-ABC
        source:
          type: string
          example: Facebook
        device:
          type: string
          enum:
          - PC
          - ANDROID
          - IPHONE
          - IPAD
          - MOBILEWEB
        user_agent:
          type: string
    TrackingProduct:
      type: object
      required:
      - id
      - name
      description: A product object within an event payload
      properties:
        id:
          type: string
          description: Product ID — must match the ID in your ProductFeed
        name:
          type: string
        price:
          type: integer
        category:
          type: string
        brand:
          type: string
          description: Multiple brands separated by comma
        quantity:
          type: string
          description: Number of this product in the cart/order
        variant:
          type: string
          description: 'JSON string, e.g. {"color": "blue", "size": "M"}'
        sku:
          type: string
    ReportStatus:
      type: string
      enum:
      - RUNNING
      - SUCCESS
      - FAIL
    ReportItem:
      type: object
      properties:
        report_id:
          type: integer
          example: 123
        report_name:
          type: string
          example: August Report
        status:
          $ref: '#/components/schemas/ReportStatus'
    ProductPhoto:
      type: object
      properties:
        name:
          type: string
          example: 100x100
        link:
          type: string
          format: uri
    RecommendedProduct:
      type: object
      properties:
        product_id:
          type: integer
          example: 1
        product_name:
          type: string
          example: Logitech M221 Silent Mouse
        product_url:
          type: string
          format: uri
          example: https://example.com/products/1
        product_price:
          type: number
          example: 800
        special_price:
          type: number
          example: 720
        photo_url:
          type: string
          format: uri
          example: https://cdn.example.com/m221.jpg
        additional_photo_url:
          type: array
          items:
            $ref: '#/components/schemas/ProductPhoto'
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-OmniSegment-Api-Key
  parameters:
    TidQuery:
      name: tid
      in: query
      required: true
      schema:
        type: string
        example: OA-xxxxxx
      description: Organization tenant ID
