  /api/import-gift-voucher/:
    post:
      tags:
      - Gift Vouchers
      summary: Import Gift Voucher (single or batch)
      operationId: importGiftVoucher
      description: 'Import gift voucher data. The `data` field accepts either:

        - A **single object** for one voucher (rate limit: 30 req/s)

        - An **array of objects** for batch import up to 100 vouchers (rate limit:
        10 req/s)


        ## Member lookup

        By default uses `member_sn` to find the member. Use `identifier_field` to
        change this,

        or use `source_id` + `source_system` for externally mapped members.


        ## Date formats accepted

        `2024-05-01`, `2024-05-01 12:00:00`, `2024-05-01 12:00:00+08`, `2024-05-01T12:00:00+08`


        ## Required fields in each voucher

        `voucher_id`, `member_sn` (or `source_id`), `voucher_type`, `amount`, `valid_from`,
        `valid_util`

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                api_key:
                  type: string
                  format: uuid
                identifier_field:
                  type: string
                  enum:
                  - line_id
                  - phone
                  - email
                  - messenger_psid
                  description: Field to look up member (defaults to member_sn)
                data:
                  description: Single voucher object or array of up to 100 vouchers
                  oneOf:
                  - type: object
                    required:
                    - voucher_id
                    - voucher_type
                    - amount
                    - valid_from
                    - valid_util
                    properties:
                      voucher_id:
                        type: string
                        example: VCH-111
                      member_sn:
                        type: string
                        example: AAAAAA
                      source_id:
                        type: string
                        example: CRM-12345
                      source_system:
                        type: string
                        example: CRM
                      voucher_type:
                        type: string
                        example: birthday_gift
                      amount:
                        type: number
                        example: 999
                      valid_from:
                        type: string
                        example: '2024-03-03'
                      valid_util:
                        type: string
                        example: '2025-03-03'
                      is_redeemed:
                        type: boolean
                        example: false
                      category:
                        type: string
                        example: coupon
                      site:
                        type: string
                        example: MAIN
                  - type: array
                    maxItems: 100
                    items:
                      type: object
                      required:
                      - voucher_id
                      - voucher_type
                      - amount
                      - valid_from
                      - valid_util
                      properties:
                        voucher_id:
                          type: string
                        member_sn:
                          type: string
                        source_id:
                          type: string
                        source_system:
                          type: string
                        email:
                          type: string
                        voucher_type:
                          type: string
                        amount:
                          type: number
                        valid_from:
                          type: string
                        valid_util:
                          type: string
                        is_redeemed:
                          type: boolean
                        category:
                          type: string
                        site:
                          type: string
            examples:
              SingleVoucher:
                summary: Single gift voucher
                description: 'Import one gift voucher for a specific member.

                  `category` can be `coupon`, `giftvoucher`, or a custom value.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    voucher_id: VCH-111
                    member_sn: AAAAAA
                    voucher_type: birthday_gift
                    amount: 999
                    valid_from: '2024-03-03'
                    valid_util: '2025-03-03'
                    is_redeemed: false
                    category: coupon
              SingleVoucherByEmail:
                summary: Single voucher — look up member by email
                description: 'Use `identifier_field: email` when you have the member''s
                  email but not their member_sn.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  identifier_field: email
                  data:
                    voucher_id: VCH-222
                    email: alice@example.com
                    voucher_type: welcome
                    amount: 200
                    valid_from: '2024-01-01'
                    valid_util: '2024-12-31'
                    category: giftvoucher
              SingleVoucherBySourceId:
                summary: Single voucher — look up member by external source_id
                description: 'Use `source_id` + `source_system` when the member was
                  mapped via the

                  Audience Mapping API.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    voucher_id: VCH-333
                    source_id: CRM-12345
                    source_system: CRM
                    voucher_type: loyalty_reward
                    amount: 500
                    valid_from: '2024-06-01'
                    valid_util: '2025-06-01'
              BatchVouchers:
                summary: Batch gift vouchers (up to 100)
                description: 'Import multiple vouchers in one request by providing
                  `data` as an array.

                  Rate limit for batch mode is 10 requests/second.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                  - voucher_id: VCH-111
                    member_sn: AAAAAA
                    voucher_type: birthday_gift
                    amount: 999
                    valid_from: '2024-03-03'
                    valid_util: '2025-03-03'
                    is_redeemed: false
                    category: coupon
                  - voucher_id: VCH-222
                    member_sn: BBBBBB
                    voucher_type: welcome
                    amount: 100
                    valid_from: '2024-02-01'
                    valid_util: '2025-02-01'
                    category: giftvoucher
                  - voucher_id: VCH-333
                    member_sn: CCCCCC
                    voucher_type: loyalty_reward
                    amount: 500
                    valid_from: '2024-06-01'
                    valid_util: '2025-06-01'
                    is_redeemed: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: These values are required in post data
                  : api_key, tid, data'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/v1/beacon/track-event/:
    post:
      tags:
      - Event Tracking
      summary: Track Event
      operationId: trackEvent
      description: 'Send a behavioral event to OmniSegment.


        - Use `hit_type: pageview` for page view events (no `event_action` needed)

        - Use `hit_type: event` for interaction events (include `event_action` + `event_category`)

        - Always include `uid` (member serial number) after a user logs in


        See the **Examples** dropdown for all 9 supported event types.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - client_id
              - tid
              - hit_type
              properties:
                client_id:
                  type: string
                  description: Device ID (IDFA/IDFV for iOS, AAID/SSAID for Android,
                    or a web client ID)
                  example: '1235621.1252357334'
                tid:
                  type: string
                  description: Organization ID in OmniSegment
                  example: OA-xxxxxxxx
                hit_type:
                  type: string
                  enum:
                  - pageview
                  - event
                uid:
                  type: string
                  description: Member serial number — include after user logs in
                app_id:
                  type: string
                  example: com.company.app
                app_version:
                  type: string
                  example: 1.3.2
                app_name:
                  type: string
                currency_code:
                  type: string
                  example: TWD
                document_location:
                  type: string
                  description: Full URL of the page where the event fired
                  example: https://example.com/products/123
                document_title:
                  type: string
                data_source:
                  type: string
                  enum:
                  - web
                  - app
                event_action:
                  type: string
                  description: 'Predefined values: `AddToCart`, `Checkout`, `Refund`,
                    `ClickProduct`,

                    `CompleteRegistration`, `ViewContent`, `Purchase`, `RemoveFromCart`,

                    `Search`, `AddToWishlist`, `FormFillOut`.

                    Use a custom string for Custom Events.

                    '
                event_category:
                  type: string
                  description: 'Predefined values: `ClickFooter`, `ViewContent`, `Ecommerce`,

                    `CompleteRegistration`, `Sort`, `Filter`, `ClickMenu`, `Search`,
                    `FormFillOut`.

                    '
                event_label:
                  type: string
                  description: 'JSON string used for Search and CompleteRegistration
                    events.

                    Search example: `{"search_string": "keyword"}`

                    Registration example: `{"email": "...", "city": "...", "regType":
                    "google"}`

                    '
                event_value:
                  type: string
                  description: 'Custom Event value. Plain string or JSON string.

                    Note: events configured after 2026-03-02 require JSON format.

                    '
                products:
                  type: array
                  maxItems: 30
                  items:
                    $ref: '#/components/schemas/TrackingProduct'
                transaction_revenue:
                  type: integer
                  description: Total order amount — required for Purchase and Refund
                    events
                transaction_id:
                  type: string
                  description: Order ID — required for Purchase and Refund events
                transaction_tax:
                  type: integer
                transaction_shipping:
                  type: integer
                transaction_couponcode:
                  type: string
            examples:
              1_ProductImpressions:
                summary: 1. Product Impressions — viewing a product list
                description: 'Track when a user views a product listing page (home,
                  category, search results).

                  Use `hit_type: pageview`. Products require at minimum `id` and `name`.

                  '
                value:
                  client_id: '1235621.1252357334'
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: web
                  hit_type: pageview
                  currency_code: TWD
                  document_location: https://example.com/category/shoes
                  document_title: Shoes Collection
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    brand: Logitech
                    price: 800
                    variant: '{"color": "blue"}'
                    sku: SM21-SH-M02-RD-S-001
                  - id: DCAN8J-A90097Q9R
                    name: Logitech K65M Keyboard
                    brand: Logitech
                    price: 2800
                    variant: '{"color": "black"}'
                    sku: SM21-SH-M02-RD-S-002
              2_ProductClicks:
                summary: 2. Product Clicks — user clicks a product
                description: 'Track when a user clicks a product from a listing to
                  view its detail page.

                  Use `event_action: ClickProduct`, `event_category: Ecommerce`, `hit_type:
                  event`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: ClickProduct
                  event_category: Ecommerce
                  currency_code: TWD
                  app_id: com.company.app
                  app_version: 1.3.2
                  app_name: MyApp
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    brand: Logitech
                    price: 800
                    variant: '{"color": "blue"}'
              3_ProductDetailImpressions:
                summary: 3. Product Detail Impressions — viewing a product detail
                  page
                description: 'Track when a user views the product detail page.

                  Similar to Product Impressions but triggered on the individual product
                  page.

                  Use `hit_type: pageview`.

                  '
                value:
                  client_id: '1235621.1252357334'
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: web
                  hit_type: pageview
                  currency_code: TWD
                  document_location: https://example.com/products/DCAN8J-A90097H2N
                  document_title: Logitech M221 Silent Mouse
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    brand: Logitech
                    price: 800
                    variant: '{"color": "blue"}'
                    sku: SM21-SH-M02-RD-S-001
              4a_AddToCart:
                summary: 4a. Add to Cart
                description: 'Track when a user adds a product to the shopping cart.

                  Use `event_action: AddToCart`, `event_category: Ecommerce`, `hit_type:
                  event`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: AddToCart
                  event_category: Ecommerce
                  currency_code: TWD
                  app_id: com.company.app
                  app_version: 1.3.2
                  app_name: MyApp
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    brand: Logitech
                    price: 800
                    quantity: '1'
                    variant: '{"color": "blue"}'
                    sku: SM21-SH-M02-RD-S-001
              4b_RemoveFromCart:
                summary: 4b. Remove from Cart
                description: 'Track when a user removes a product from the shopping
                  cart.

                  Use `event_action: RemoveFromCart`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: RemoveFromCart
                  event_category: Ecommerce
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    quantity: '1'
              5_Checkout:
                summary: 5. Checkout — user begins checkout
                description: 'Track when the user reaches the checkout page or initiates
                  the checkout flow.

                  Use `event_action: Checkout`, `event_category: Ecommerce`, `hit_type:
                  event`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: Checkout
                  event_category: Ecommerce
                  currency_code: TWD
                  app_id: com.company.app
                  app_version: 1.3.2
                  app_name: MyApp
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    brand: Logitech
                    price: 800
                    quantity: '1'
                  - id: DCAN8J-A90097HK2
                    name: Logitech K65M Keyboard
                    brand: Logitech
                    price: 1800
                    quantity: '1'
              6a_Purchase:
                summary: 6a. Purchase — user completes an order
                description: 'Track when the user successfully completes a purchase.

                  `transaction_id` and `transaction_revenue` are required.

                  Products must include `id`, `name`, and `quantity`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: Purchase
                  event_category: Ecommerce
                  transaction_id: '#8701873727'
                  transaction_revenue: 3400
                  currency_code: TWD
                  app_id: com.company.app
                  app_version: 1.3.2
                  app_name: MyApp
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    quantity: '2'
                    brand: Logitech
                    price: 800
                    variant: '{"color": "blue"}'
                  - id: DCAN8J-A90097HK2
                    name: Logitech K65M Keyboard
                    quantity: '1'
                    brand: Logitech
                    price: 1800
              6b_Refund:
                summary: 6b. Refund — user refunds an order
                description: 'Track when an order is refunded.

                  Use `event_action: Refund` with the same `transaction_id` and `transaction_revenue`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: Refund
                  event_category: Ecommerce
                  transaction_id: '#8701873727'
                  transaction_revenue: 3400
                  products:
                  - id: DCAN8J-A90097H2N
                    name: Logitech M221 Silent Mouse
                    quantity: '2'
              7_CompleteRegistration:
                summary: 7. Complete Registration — user finishes account signup
                description: 'Track when a user completes registration.

                  Use `event_label` (JSON string) to include registration details
                  like email and city.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: app
                  hit_type: event
                  event_action: CompleteRegistration
                  event_category: CompleteRegistration
                  app_id: com.company.app
                  app_version: 1.3.2
                  app_name: MyApp
                  event_label: '{"email": "user@example.com", "city": "Taipei", "birthdayYear":
                    "1996", "regType": "google"}'
              8_Search:
                summary: 8. Submit a Search — user performs a search
                description: 'Track when a user submits a search query.

                  Include the search term in `event_label` as a JSON string: `{"search_string":
                  "..."}`.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: web
                  hit_type: event
                  event_action: Search
                  event_category: Search
                  document_location: https://example.com/search?q=wireless+mouse
                  document_title: Search Results
                  event_label: '{"search_string": "wireless mouse"}'
              9a_CustomEvent_String:
                summary: 9a. Custom Event — string value
                description: 'For custom events where the value is a plain string.

                  Use any event_action name registered in your OmniSegment configuration.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: web
                  hit_type: event
                  event_action: Subscribe
                  event_value: GameMicroservicePlan
                  document_location: https://example.com/subscription
                  document_title: Subscribe Channel
              9b_CustomEvent_JSON:
                summary: 9b. Custom Event — JSON value (required for events after
                  2026-03-02)
                description: 'For custom events configured after 2026-03-02, `event_value`
                  must be a

                  JSON-formatted string even when there is only one parameter.

                  '
                value:
                  client_id: EA7583CD-A667-48BC-B806-42ECB2B48606
                  uid: '139540'
                  tid: OA-xxxxxxxx
                  data_source: web
                  hit_type: event
                  event_action: FormFillOut
                  event_value: '{"code": "T12094", "number": 19.38, "time": "2024-03-07T09:24:21.361878+00:00",
                    "description": "newsletter signup"}'
      responses:
        '200':
          description: Event received successfully
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request — missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing required fields: client_id, tid, hit_type'
        '403':
          description: Forbidden — invalid X-OmniSegment-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid X-OmniSegment-Api-Key'
  /api/v1/interaction-report/:
    post:
      tags:
      - Interaction Report
      summary: Create Interaction Report
      operationId: createInteractionReport
      description: 'Queues a report generation job for the specified date range.


        The report file (JSONL format) is available via the `report_url` once status
        is `SUCCESS`.


        **Date range**: max 31 days. Both the "Sent Date" and click/open behavior
        must fall within the range.

        '
      parameters:
      - $ref: '#/components/parameters/TidQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - report_name
              - start_date
              - end_date
              properties:
                report_name:
                  type: string
                  example: August Report
                start_date:
                  type: string
                  format: date
                  example: '2022-08-01'
                end_date:
                  type: string
                  format: date
                  example: '2022-08-31'
            example:
              report_name: August Report
              start_date: '2022-08-01'
              end_date: '2022-08-31'
      responses:
        '200':
          description: Report queued — use the returned report_id to check status
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD:
                  report_id: 123
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: Date range cannot exceed 31 days
        '403':
          description: Forbidden — invalid X-OmniSegment-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid X-OmniSegment-Api-Key'
    get:
      tags:
      - Interaction Report
      summary: List Interaction Reports
      operationId: listInteractionReports
      description: 'Returns all interaction reports created within the **last 24 hours**.

        '
      parameters:
      - $ref: '#/components/parameters/TidQuery'
      responses:
        '200':
          description: List of recent reports
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD:
                - report_id: 123
                  report_name: August Report
                  status: RUNNING
                - report_id: 124
                  report_name: September Report
                  status: SUCCESS
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing required parameter: tid'
        '403':
          description: Forbidden — invalid X-OmniSegment-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid X-OmniSegment-Api-Key'
  /api/v1/interaction-report/{id}/:
    get:
      tags:
      - Interaction Report
      summary: Retrieve Interaction Report
      operationId: retrieveInteractionReport
      description: 'Get the status and download URL for a specific report.


        `report_url` is only populated when `status` is `SUCCESS`.


        The JSONL report file contains one record per line with fields:

        `member_sn`, `channel_type`, `template_id`, `template_name`, `delivery_time`,

        `template_title` (email only), `open`, `open_time`, `click`, `click_event`,
        `email_status`.


        ### email_status values

        | Value | Meaning |

        |---|---|

        | `sent` | Delivered to receiving server |

        | `open` | Recipient opened the email |

        | `click` | Recipient clicked a link |

        | `bounce` | Permanently rejected |

        | `blocked` | Temporarily rejected |

        | `unsub` | Recipient unsubscribed |

        | `spam` | Marked as spam |

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 123
        description: Report ID from the Create Report response
      - $ref: '#/components/parameters/TidQuery'
      responses:
        '200':
          description: Report details
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD:
                  report_name: August Report
                  status: SUCCESS
                  report_url: https://storage.example.com/reports/august-report.json
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: Report not found
        '403':
          description: Forbidden — invalid X-OmniSegment-Api-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid X-OmniSegment-Api-Key'
