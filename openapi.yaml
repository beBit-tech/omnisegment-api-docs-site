openapi: 3.0.3
info:
  title: OmniSegment API
  description: Complete API reference for OmniSegment.
  version: 1.0.0
servers:
- url: https://api.omnisegment.com
tags:
- name: Audience
  description: Import and update audience records
- name: Purchase
  description: Import purchase and transaction records
- name: Product Catalog
  description: Import product catalog data
- name: Product Events
  description: Import event registrations and product guarantee data
- name: Gift Vouchers
  description: Import gift voucher data (single or batch)
- name: Event Tracking
  description: Track user behavior via the beacon endpoint
- name: Interaction Report
  description: Email / LINE / SMS delivery and engagement reports
- name: Tracking Event Report
  description: Beacon / tracking event reports
- name: Interactive Audiences Report
  description: Reports of audiences who interacted within a date range
- name: Workflow
  description: Trigger workflow automation nodes
- name: Recommendation
  description: AI-powered product recommendations
- name: Mapping
  description: Map external system audience IDs to OmniSegment profiles
paths:
  /ma_audience/import-audience/:
    post:
      tags:
      - Audience
      summary: Import Audience (single)
      operationId: importAudience
      description: 'Import or update a single audience record.


        For bulk imports (up to 50 records), use **POST /api/v2/audiences/batch-import/**.


        ## merge_key

        Determines which field to use when looking up existing records. Defaults to
        `member_sn`.


        | merge_key | Required field in data |

        |---|---|

        | `member_sn` (default) | `member_sn` |

        | `email` | `email` |

        | `phone` | `phone` |

        | `line_id` | `line_id` |

        | `messenger_psid` | `messenger_psid` |

        | `source_id` | `source_id` + `source_system` |


        ## tag_mode

        - `append` (default): new tags are **added** to existing tags

        - `replace`: existing tags are **replaced entirely** with the new set


        ## ignore_empty_value

        - `true`: empty string / null input does **not** clear existing data; send
        `"none"` to explicitly clear

        - `false` (default): empty, null, or `"none"` all clear the field

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                  example: 00000000-0000-0000-0000-000000000000
                data:
                  $ref: '#/components/schemas/AudienceData'
                ignore_empty_value:
                  type: boolean
                merge_key:
                  type: string
                  default: member_sn
                  enum:
                  - member_sn
                  - line_id
                  - email
                  - phone
                  - messenger_psid
                  - source_id
                tag_mode:
                  type: string
                  default: append
                  enum:
                  - append
                  - replace
            examples:
              ByMemberSN_AppendTags:
                summary: 'Default: match by member_sn, append tags'
                description: 'The most common usage. Match the audience by `member_sn`
                  and add new tags

                  without removing existing ones (`tag_mode: append`).

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  ignore_empty_value: true
                  tag_mode: append
                  data:
                    member_sn: '1'
                    name: Eason Lee
                    first_name: Eason
                    last_name: Lee
                    email: eason@example.com
                    phone: '+886912345678'
                    member_level: '1'
                    sex: female
                    birthday: '1990-01-01'
                    register_date: '2020-06-04T08:30:37.235482+08:00'
                    register_type: line
                    line_id: Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                    is_subscriber: true
                    is_subscriber_line: true
                    is_subscriber_sms: true
                    is_subscriber_pn: true
                    tags: tag_a,tag_b,tag_c
                    iso_code: TW
                    city: Taipei
                    country: Taiwan
                    point_balance: '1234'
                    membership_expire_at: '2025-07-23T08:30:37+08:00'
                    email_channels:
                    - name: email
                      subscription_status: true
                    line_channels:
                    - name: line
                      subscription_status: true
              ByMemberSN_ReplaceTags:
                summary: 'Replace tags: overwrite all existing tags'
                description: 'Use `tag_mode: replace` to completely overwrite the
                  member''s current tags.

                  If the member previously had `tag_a, tag_b` and you send `tag_c,
                  tag_d`,

                  the result will be only `tag_c, tag_d`.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  tag_mode: replace
                  data:
                    member_sn: '1'
                    tags: vip,gold_member
              ByEmail:
                summary: Match by email address
                description: 'Use `merge_key: email` to look up the member by email
                  instead of member_sn.

                  Useful when member_sn is not available.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: email
                  data:
                    email: eason@example.com
                    member_level: gold
                    point_balance: '500'
              ByPhone:
                summary: Match by phone number
                description: 'Use `merge_key: phone` to look up the member by phone
                  number.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: phone
                  data:
                    phone: '+886912345678'
                    member_level: silver
                    tags: sms_subscriber
              ByLineId:
                summary: Match by LINE ID
                description: 'Use `merge_key: line_id` to look up a member via their
                  LINE account.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: line_id
                  data:
                    line_id: Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                    is_subscriber_line: true
                    tags: line_user
              BySourceId:
                summary: Match by external source_id (CRM / other system)
                description: 'Use `merge_key: source_id` when the audience was previously
                  mapped via the

                  Audience Mapping API. `source_system` is required alongside `source_id`.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: source_id
                  data:
                    source_id: CRM-12345
                    source_system: CRM
                    member_level: platinum
              WithFcmTokens:
                summary: Import with push notification tokens (FCM)
                description: 'Include multiple FCM tokens for push notification targeting.

                  Use `fcm_tokens` (array) instead of the single `fcm_token` field.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  data:
                    member_sn: '1'
                    fcm_tokens:
                    - token: fcm_token_ios_device_123
                      active: true
                      type: ios
                    - token: fcm_token_android_device_456
                      active: true
                      type: android
                    is_subscriber_pn: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD:
                  status: OK
                  error_msg: ''
        '400':
          description: Bad Request — missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: These values are required in post data
                  : api_key, tid, data'
        '403':
          description: Forbidden — invalid API key or tid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/v2/audiences/batch-import/:
    post:
      tags:
      - Audience
      summary: Batch Import Audience (up to 50 records)
      operationId: batchImportAudience
      description: 'Import or update up to **50** audience records in a single request.


        The `data` field is an array where each item follows the same schema as the

        single Import Audience endpoint.


        **custom_fields_identifier_field** allows targeting specific sub-items within

        JSON-type custom fields (multi-field type) for in-place updates.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                data:
                  type: array
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/AudienceData'
                ignore_empty_value:
                  type: boolean
                merge_key:
                  type: string
                  default: member_sn
                  enum:
                  - member_sn
                  - line_id
                  - email
                  - phone
                  - messenger_psid
                tag_mode:
                  type: string
                  default: append
                  enum:
                  - append
                  - replace
                custom_fields_identifier_field:
                  type: object
                  description: Identifier key for JSON-type custom fields update
                  additionalProperties:
                    type: string
                  example:
                    bonus: bonus_point
            examples:
              BatchByMemberSN_AppendTags:
                summary: Multiple members, match by member_sn, append tags
                description: 'Batch import up to 50 members in one request. Tags are
                  appended (not replaced).

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  tag_mode: append
                  ignore_empty_value: true
                  data:
                  - member_sn: '1'
                    name: Eason Lee
                    email: eason@example.com
                    phone: '+886912345678'
                    member_level: '1'
                    sex: female
                    tags: tag_a,tag_b,tag_c
                    is_subscriber: true
                  - member_sn: '2'
                    name: Lebron James
                    email: lebron@example.com
                    phone: '+886912345677'
                    member_level: '2'
                    sex: male
                    tags: tag_a,tag_b
              BatchByMemberSN_ReplaceTags:
                summary: Multiple members, replace tags
                description: 'Same as above but with `tag_mode: replace` — each member''s
                  tags will be

                  overwritten with the new set provided.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  tag_mode: replace
                  data:
                  - member_sn: '1'
                    tags: vip,gold_member
                  - member_sn: '2'
                    tags: regular
              BatchByEmail:
                summary: Multiple members, match by email
                description: Batch update using email as the lookup key.
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: email
                  data:
                  - email: alice@example.com
                    member_level: gold
                  - email: bob@example.com
                    member_level: silver
              BatchWithCustomJsonField:
                summary: Update JSON-type custom field with identifier
                description: 'Use `custom_fields_identifier_field` to update specific
                  sub-items inside a

                  JSON-type custom field. Here `bonus_point` identifies which `bonus`
                  entry to update.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  merge_key: member_sn
                  custom_fields_identifier_field:
                    bonus: bonus_point
                  data:
                  - member_sn: '1'
                    bonus:
                    - bonus_point: '678'
                      bonus_expire_date: '2025-06-04T08:30:37.235482+08:00'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/import-purchase-data/:
    post:
      tags:
      - Purchase
      summary: Import Purchase Data (single)
      operationId: importPurchaseData
      description: 'Import a single purchase / transaction record.


        For bulk imports (up to 50 records), use **POST /api/v2/purchase/batch-import/**.


        ## identifier_field

        Determines which field to use when looking up the member. Defaults to `member_sn`.


        | identifier_field | Required field in data |

        |---|---|

        | (none / default) | `member_sn` |

        | `email` | `email` |

        | `phone` | `phone` |

        | `line_id` | `line_id` |

        | `messenger_psid` | `messenger_psid` |


        ## debug_mode

        - `0` (default): background processing — errors are not surfaced immediately

        - `1`: synchronous processing — any error is returned to the client right
        away (useful during integration testing)


        ## transaction_status values

        | Value | Meaning |

        |---|---|

        | `SUCCESS` | Completed order |

        | `CANCEL` | Cancelled order |

        | `REFUND` | Refunded order |

        | `FAIL` | Failed order |

        | `SHIPPED` | Order shipped |

        | `PAID` | Order paid |

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                  example: 00000000-0000-0000-0000-000000000000
                data:
                  $ref: '#/components/schemas/PurchaseData'
                is_anonymous:
                  type: boolean
                  default: false
                  description: '`true`: order has no customer info (no member lookup
                    performed).

                    `false` (default): order must contain customer identification.

                    '
                identifier_field:
                  type: string
                  enum:
                  - line_id
                  - phone
                  - email
                  - messenger_psid
                  description: Field used to look up the member (defaults to member_sn)
                debug_mode:
                  type: integer
                  enum:
                  - 0
                  - 1
                  default: 0
            examples:
              StandardPurchase:
                summary: Standard purchase linked to member_sn (default)
                description: 'The most common usage. Links the order to a known member
                  via `member_sn`.

                  Includes shipping address, vouchers, and device info.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  is_anonymous: false
                  data:
                    member_sn: '1'
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: 23740b4a-5872-4363-ad32-5532a89e4cb1
                    transaction_revenue: 5000.0
                    transaction_status: SUCCESS
                    quantities: 2
                    products: P001,P002
                    products_name: Product1,Product2
                    products_quantity: 1,1
                    physical_store_name: Fake Store
                    shipping_address:
                      address1: 123 Shipping Street
                      city: Shippington
                      country: United States
                      country_code: US
                      province: Kentucky
                      province_code: KY
                      zip: '40003'
                    voucher:
                    - voucher_name: birthday_gift
                    source: Facebook
                    device: MOBILEWEB
                    user_agent: Mozilla/5.0 (iPhone; CPU iPhone OS 12_0)
              AnonymousOrder:
                summary: Anonymous order (no customer info)
                description: 'Set `is_anonymous: true` when the order has no associated
                  customer.

                  The `member_sn` field is not required in this case.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  is_anonymous: true
                  data:
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: anon-order-001
                    transaction_revenue: 1200.0
                    transaction_status: SUCCESS
                    products: P003
                    products_quantity: '1'
              ByEmail:
                summary: 'Look up member by email (identifier_field: email)'
                description: 'Use `identifier_field: email` when you don''t have the
                  `member_sn` but

                  you know the customer''s email address.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  identifier_field: email
                  data:
                    email: eason@example.com
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: email-order-001
                    transaction_revenue: 3000.0
                    transaction_status: SUCCESS
                    products: P001
              ByPhone:
                summary: 'Look up member by phone (identifier_field: phone)'
                description: 'Use `identifier_field: phone` to link the order by phone
                  number.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  identifier_field: phone
                  data:
                    phone: '+886912345678'
                    datetime: 2020-06-01T10:00:00+0800
                    transaction_id: phone-order-001
                    transaction_revenue: 800.0
                    transaction_status: SUCCESS
                    products: P005
              WithDebugMode:
                summary: 'Debug mode: synchronous error response'
                description: 'Set `debug_mode: 1` during integration development.
                  Errors are returned

                  immediately in the response instead of being silently queued.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  debug_mode: 1
                  data:
                    member_sn: '1'
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: debug-order-001
                    transaction_revenue: 100.0
                    transaction_status: SUCCESS
              WithProductMapping:
                summary: Products with cross-system ID mapping
                description: 'Use a products object to record both your internal product
                  ID and an

                  external system ID (e.g., CRM) for the same product.

                  This allows looking up the product by either ID in the future.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    member_sn: '1'
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: map-order-001
                    transaction_revenue: 2500.0
                    transaction_status: SUCCESS
                    products:
                      default: P001,P002
                      CRM: CRM-P001,CRM-P002
              CancelOrRefund:
                summary: Cancel / Refund an order
                description: 'Import a cancelled or refunded order by setting `transaction_status`

                  to `CANCEL` or `REFUND`. This updates the member''s purchase history
                  accordingly.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    member_sn: '1'
                    datetime: 2020-01-15T00:00:00+0800
                    transaction_id: 23740b4a-5872-4363-ad32-5532a89e4cb1
                    transaction_revenue: 5000.0
                    transaction_status: REFUND
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: Request must include api_key, tid and
                  data_content.'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/v2/purchase/batch-import/:
    post:
      tags:
      - Purchase
      summary: Batch Import Purchase Data (up to 50 records)
      operationId: batchImportPurchaseData
      description: 'Import up to **50** purchase / transaction records in a single
        request.


        Each item in `data` follows the same schema as the single Import Purchase
        Data endpoint.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                data:
                  type: array
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/PurchaseData'
                is_anonymous:
                  type: boolean
                  default: false
                identifier_field:
                  type: string
                  enum:
                  - line_id
                  - phone
                  - email
                  - messenger_psid
            examples:
              BatchByMemberSN:
                summary: Multiple orders for different members
                description: 'Import multiple orders in a single request. Each order
                  is linked to a member via `member_sn`.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                  - member_sn: '1'
                    datetime: 2020-01-01T00:00:00+0800
                    transaction_id: TXN-001
                    transaction_revenue: 5000.0
                    transaction_status: SUCCESS
                    quantities: 2
                    products: P001,P002
                    products_quantity: 1,1
                  - member_sn: '2'
                    datetime: 2020-01-02T10:00:00+0800
                    transaction_id: TXN-002
                    transaction_revenue: 1200.0
                    transaction_status: SUCCESS
                    products: P003
                  - member_sn: '3'
                    datetime: 2020-01-02T14:00:00+0800
                    transaction_id: TXN-003
                    transaction_revenue: 3800.0
                    transaction_status: SHIPPED
                    products: P004,P005
              BatchByEmail:
                summary: Multiple orders looked up by email
                description: 'Use `identifier_field: email` for all orders in this
                  batch request.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  identifier_field: email
                  data:
                  - email: alice@example.com
                    datetime: 2020-03-01T09:00:00+0800
                    transaction_id: EMAIL-TXN-001
                    transaction_revenue: 2000.0
                    transaction_status: SUCCESS
                    products: P010
                  - email: bob@example.com
                    datetime: 2020-03-01T11:30:00+0800
                    transaction_id: EMAIL-TXN-002
                    transaction_revenue: 750.0
                    transaction_status: SUCCESS
                    products: P011
              BatchAnonymous:
                summary: Multiple anonymous orders
                description: 'Import orders with no customer info using `is_anonymous:
                  true`.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  is_anonymous: true
                  data:
                  - datetime: 2020-04-01T10:00:00+0800
                    transaction_id: ANON-001
                    transaction_revenue: 500.0
                    transaction_status: SUCCESS
                  - datetime: 2020-04-01T10:30:00+0800
                    transaction_id: ANON-002
                    transaction_revenue: 1800.0
                    transaction_status: SUCCESS
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/v1/products/import/:
    post:
      tags:
      - Product Catalog
      summary: Import Product
      operationId: importProduct
      description: "Import product catalog data.\n\n## Product ID formats\n- **String**\
        \ (single system): `\"id\": \"P001\"` — straightforward product ID\n- **Object**\
        \ (multi-system): `\"id\": {\"default\": \"P001\", \"CRM\": \"CRM-P001\"}`\
        \ — links the same\n  product across multiple external systems so it can be\
        \ found by any system's ID in the future\n\n## Required fields in `data`\n\
        `id`, `title`, `link`, `availability`, `image_link`, `price`\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                  example: 00000000-0000-0000-0000-000000000000
                site:
                  type: string
                  description: Site identifier for multi-site organizations
                data:
                  type: object
                  description: Product data object
                  properties:
                    id:
                      type: string
                      description: 'Product ID. Two formats supported:

                        - **Single system** (string): `"P001"`

                        - **Multi-system** (JSON object string): `{"default":"P001","CRM":"CRM-P001"}`
                        — links the same product across multiple systems

                        '
                      example: P001
                    title:
                      type: string
                      description: Product name
                      example: Classic White T-Shirt
                    link:
                      type: string
                      format: uri
                      description: Product page URL
                      example: https://example.com/products/white-tshirt
                    availability:
                      type: string
                      enum:
                      - in stock
                      - out of stock
                      - preorder
                      example: in stock
                    image_link:
                      type: string
                      format: uri
                      example: https://cdn.example.com/tshirt.png
                    price:
                      type: string
                      description: Price as string
                      example: '999'
                    brand:
                      type: string
                      example: MyBrand
                    sale_price:
                      type: string
                      example: '799'
                    sale_price_effective_date:
                      type: string
                      example: 2024-01-01T00:00:00+00:00/2024-12-31T23:59:59+00:00
                    product_type:
                      type: string
                      example: Apparel > Shirts
                    item_group_id:
                      type: string
                      example: TSHIRT-001
                    additional_image_link:
                      type: string
                      format: uri
                      example: https://cdn.example.com/tshirt-back.png
            examples:
              SingleSystemId:
                summary: Single product ID (one system)
                description: 'Standard product import using a plain string ID.

                  This is the most common format when you have one product identifier
                  system.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  site: MAIN
                  data:
                    id: P001
                    title: Classic White T-Shirt
                    link: https://example.com/products/white-tshirt
                    availability: in stock
                    image_link: https://cdn.example.com/tshirt.png
                    price: '999'
                    brand: MyBrand
                    sale_price: '799'
                    product_type: Apparel > Shirts
              MultiSystemIds:
                summary: Multi-system product IDs (cross-system mapping)
                description: 'Use an object for `id` when the same product exists
                  across multiple systems (e.g., your

                  website, CRM, and ERP all have different IDs for the same product).

                  After import, the product can be found using any of these IDs.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    id:
                      default: P001
                      CRM: CRM-SHIRT-001
                      ERP: ERP-10045
                    title: Classic White T-Shirt
                    link: https://example.com/products/white-tshirt
                    availability: in stock
                    image_link: https://cdn.example.com/tshirt.png
                    price: '999'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD:
                  status: OK
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: These values are required in post data
                  : api_key, tid, data'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
  /api/v1/products/import-event-registration-data/:
    post:
      tags:
      - Product Events
      summary: Import Event Registration Data
      operationId: importEventRegistrationData
      description: 'Import product event registration data (e.g., workshop signups,
        product launch events).


        ## Required fields in `data`

        `event_id`, `member_sn`, `event_name`, `registration_datetime`


        ## Product ID in `products`

        The `products` field accepts an object where each key is a system name and
        the value is an

        array of IDs:

        ```json

        { "default": ["item_group_id1"], "sku": ["sku_id1"] }

        ```


        ## Date constraints

        `event_end_datetime` must be after `event_start_datetime`.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - data
              properties:
                tid:
                  type: string
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                data:
                  type: object
                  required:
                  - event_id
                  - member_sn
                  - event_name
                  - registration_datetime
                  properties:
                    event_id:
                      type: string
                      example: EVT-001
                    member_sn:
                      type: string
                      example: M-12345
                    event_name:
                      type: string
                      example: Summer Sale Workshop
                    registration_datetime:
                      type: string
                      format: date-time
                      example: '2022-08-17T12:00:00+08:00'
                    products:
                      type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      example:
                        default:
                        - item_group_id1
                        sku:
                        - sku_id1
                    purchase_datetime:
                      type: string
                      format: date-time
                      example: '2022-08-17T12:00:00+08:00'
                    event_start_datetime:
                      type: string
                      format: date-time
                      example: '2022-08-17T12:00:00+08:00'
                    event_end_datetime:
                      type: string
                      format: date-time
                      example: '2022-09-17T12:00:00+08:00'
                    is_available:
                      type: boolean
                      example: true
                    purchase_source:
                      type: string
                      example: supermarket
                    purchase_city:
                      type: string
                      example: Taipei
                    delivery_address:
                      type: string
                      example: 123 Main St, Taipei
            examples:
              BasicEventRegistration:
                summary: Basic event registration (required fields only)
                description: 'Minimal registration record with only the required fields.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    event_id: EVT-001
                    member_sn: M-12345
                    event_name: Summer Sale Workshop
                    registration_datetime: '2022-08-17T12:00:00+08:00'
              FullEventRegistration:
                summary: Full event registration with products and dates
                description: 'Complete registration record including product mappings,
                  event dates,

                  purchase source, and availability status.

                  '
                value:
                  tid: OA-xxxxxx
                  api_key: 00000000-0000-0000-0000-000000000000
                  data:
                    event_id: qqq123
                    member_sn: www123
                    event_name: buy1get1
                    products:
                      default:
                      - item_group_id1
                      - item_group_id2
                      sku:
                      - sku_id1
                      - sku_id2
                    registration_datetime: '2022-08-17T12:00:00+08:00'
                    purchase_datetime: '2022-08-17T12:00:00+08:00'
                    purchase_source: supermarket
                    purchase_city: Taipei
                    is_available: true
                    event_start_datetime: '2022-08-17T12:00:00+08:00'
                    event_end_datetime: '2022-09-17T12:00:00+08:00'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Missing Input Error: These values are required in post data
                  : api_key, tid, data'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                SUCCESS: false
                ERR_MSG: 'Forbidden: invalid api_key or tid'
