  /api/v1/workflow/trigger/:
    post:
      tags:
      - Workflow
      summary: Trigger Workflow
      operationId: triggerWorkflow
      description: 'Trigger a specific workflow node for one or more audience members.


        Obtain the `node_id` from the OmniSegment platform workflow configuration.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tid
              - api_key
              - node_id
              - member_sn_list
              properties:
                tid:
                  type: string
                  description: Organization tenant ID
                  example: OA-xxxxxx
                api_key:
                  type: string
                  format: uuid
                  description: Organization API key
                  example: 00000000-0000-0000-0000-000000000000
                node_id:
                  type: integer
                  description: Target workflow node ID
                  example: 128
                member_sn_list:
                  type: array
                  items:
                    type: string
                  description: Member serial numbers to trigger the workflow for
                  example:
                  - '123'
                  - '12345'
            example:
              tid: OA-c19eb6
              api_key: 2471880c-515c-47a5-a5ba-09c6235ff9ba
              node_id: 128
              member_sn_list:
              - '123'
              - '12345'
      responses:
        '200':
          description: Workflow triggered successfully
          content:
            application/json:
              example:
                SUCCESS: true
                PAYLOAD: null
